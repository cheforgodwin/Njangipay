<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C896"/>
      <stop offset="100%" stop-color="#007A5E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#F4A220"/>
    </linearGradient>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E8A8"/>
      <stop offset="100%" stop-color="#00A876"/>
    </linearGradient>
  </defs>

  <!-- Dot ring -->
  <g transform="translate(60,60)" opacity="0.35">
    <circle cx="0" cy="-50" r="2" fill="#00C896"/>
    <circle cx="35" cy="-35" r="2" fill="#00C896"/>
    <circle cx="50" cy="0" r="2" fill="#00C896"/>
    <circle cx="35" cy="35" r="2" fill="#00C896"/>
    <circle cx="0" cy="50" r="2" fill="#00C896"/>
    <circle cx="-35" cy="35" r="2" fill="#00C896"/>
    <circle cx="-50" cy="0" r="2" fill="#00C896"/>
    <circle cx="-35" cy="-35" r="2" fill="#00C896"/>
  </g>

  <!-- Main coin -->
  <circle cx="60" cy="60" r="44" fill="url(#coinGrad)"/>
  <!-- Gold ring -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="#FFD166" stroke-width="1" opacity="0.55"/>
  <!-- Dark face -->
  <circle cx="60" cy="60" r="33" fill="#00402E"/>

  <!-- N -->
  <text x="33" y="80" font-family="'Georgia', serif" font-size="42" font-weight="700" fill="url(#nGrad)">N</text>
  <!-- P -->
  <text x="56" y="80" font-family="'Georgia', serif" font-size="42" font-weight="700" fill="url(#goldGrad)">P</text>
</svg>
